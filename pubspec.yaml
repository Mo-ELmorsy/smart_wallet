name: smart_wallet
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.0.0

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.0

  # Local DB & Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # AI
  google_generative_ai: ^0.4.3

  # UI / Charts / Animations
  fl_chart: ^0.68.0
  skeletonizer: ^1.4.0
  lottie: ^3.1.2
  pdf: ^3.11.0

  # Device / Native
  local_auth: ^2.2.0
  image_picker: ^1.1.1

  # Utils
  dartz: any
  intl: any
  freezed_annotation: any
  json_annotation: ^4.9.0

  # Localization
  flutter_localizations:
    sdk: flutter
  crypto: ^3.0.7
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: any
  freezed: any
  json_serializable: any
  riverpod_generator: any
  injectable_generator: any
  hive_generator: any
  mockito: any

flutter:
  uses-material-design: true
  generate: true
